<!DOCTYPE html>
<html>
<head>
<title>Shiva Games</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    background: black;
    color: white;
}

.game-box {
    margin: 20px;
    padding: 20px;
    border: 2px solid white;
}

button {
    padding: 10px;
    margin: 5px;
}
canvas {
    background: white;
}
</style>
</head>
<body>

<h1>Welcome To Shiva Game Zone 🔥</h1>

<!-- ================= OX GAME ================= -->
<div class="game-box">
<h2>Game 1: OX</h2>
<div id="board"></div>
<p id="status"></p>
</div>

<!-- ================= CIRCLE GAME ================= -->
<div class="game-box">
<h2>Game 2: Perfect Circle</h2>
<canvas id="canvas" width="300" height="300"></canvas>
<p id="result"></p>
</div>

<script>
/* ================= OX GAME ================= */
let currentPlayer = "X";
let board = ["","","","","","","","",""];
let gameActive = true;

const boardDiv = document.getElementById("board");
const status = document.getElementById("status");

boardDiv.style.display = "grid";
boardDiv.style.gridTemplateColumns = "repeat(3, 60px)";
boardDiv.style.gap = "5px";

board.forEach((cell, index) => {
    const btn = document.createElement("button");
    btn.style.width = "60px";
    btn.style.height = "60px";
    btn.onclick = () => makeMove(index, btn);
    boardDiv.appendChild(btn);
});

function makeMove(index, btn) {
    if(board[index] !== "" || !gameActive) return;
    board[index] = currentPlayer;
    btn.innerText = currentPlayer;
    checkWinner();
    currentPlayer = currentPlayer === "X" ? "O" : "X";
}

function checkWinner() {
    const winPatterns = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    winPatterns.forEach(pattern => {
        const [a,b,c] = pattern;
        if(board[a] && board[a] === board[b] && board[a] === board[c]) {
            status.innerText = board[a] + " Wins!";
            gameActive = false;
        }
    });
}

/* ================= CIRCLE GAME ================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let points = [];

canvas.addEventListener("mousedown", () => {
    drawing = true;
    points = [];
});

canvas.addEventListener("mouseup", () => {
    drawing = false;
    calculateCircle();
});

canvas.addEventListener("mousemove", (e) => {
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    points.push({x,y});
    ctx.fillRect(x,y,2,2);
});

function calculateCircle() {
    let centerX = 150;
    let centerY = 150;
    let idealRadius = 100;
    let totalError = 0;

    points.forEach(p => {
        let dist = Math.sqrt((p.x-centerX)**2 + (p.y-centerY)**2);
        totalError += Math.abs(dist - idealRadius);
    });

    let avgError = totalError / points.length;
    let percent = Math.max(0, 100 - avgError);

    document.getElementById("result").innerText =
        "Perfectness: " + percent.toFixed(2) + "%";
}
</script>

</body>
</html>
